<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <main>
        <div class="calculator">
            <div class="displayField">
                <p id="calculations"></p>
                <div class="displayBox" id="inputContainer"></div>
            </div>
            <div class="themeContainer">
                <button class="themeBtn" id="changeThemeBtn"><i id="themeIcon" class="fa-solid fa-moon"></i> <span id="themeText">Dark Mode</span></button>
            </div>
            <div class="calculateButtons">
                <button class="clearBtn" onclick="clearAll()">Ac</button>
                <button class="clearBtn" onclick="deleteLast()"><i class="fa-solid fa-delete-left"></i></button>
                <button class="sign" onclick="addInput('/')">/</button>
                <button class="sign" onclick="addInput('*')">*</button>

                <button onclick="addInput(7)">7</button>
                <button onclick="addInput(8)">8</button>
                <button onclick="addInput(9)">9</button>
                <button class="sign" onclick="addInput('-')">-</button>

                <button onclick="addInput(4)">4</button>
                <button onclick="addInput(5)">5</button>
                <button onclick="addInput(6)">6</button>
                <button class="sign" onclick="addInput('+')">+</button>

                <button onclick="addInput(1)">1</button>
                <button onclick="addInput(2)">2</button>
                <button onclick="addInput(3)">3</button>
                <button class="tallBth sign" onclick="calculate()">=</button>

                <button class="wideBth" onclick="addInput(0)">0</button>
                <button onclick="addInput('.')">.</button>
            </div>
        </div>
    </main>
    <script src="scripts/script.js"></script>
</body>

</html>
